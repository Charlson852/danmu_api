name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream main --prune

      - name: Sync main from upstream/main while preserving this workflow
        run: |
          set -euo pipefail
          tmpfile="$RUNNER_TEMP/sync-upstream.yml"
          cp .github/workflows/sync-upstream.yml "$tmpfile"
          git checkout main
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp "$tmpfile" .github/workflows/sync-upstream.yml
          git add -A
          if git diff --cached --quiet; then
            echo "Already up to date."
            exit 0
          fi
          git commit -m "ci: sync main from upstream"
          git push --force-with-lease origin main
